# Local development services.
#   docker compose -f deploy/docker-compose.dev.yml up -d            # Postgres only
#   docker compose -f deploy/docker-compose.dev.yml --profile storage up -d   # + MinIO (R2 stand-in)
#
# Postgres is exposed on 5433 to mirror the Hetzner host cluster, so the same
# DATABASE_URL works locally and (via tunnel/ssh) against prod conventions.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: jobsapp
      POSTGRES_PASSWORD: jobsapp
      POSTGRES_DB: jobsapp
    ports:
      - "5433:5432"
    volumes:
      - jobsapp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobsapp"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Optional S3-compatible store for exercising the R2 code path locally.
  minio:
    image: minio/minio:latest
    profiles: ["storage"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: jobsapp
      MINIO_ROOT_PASSWORD: jobsapp-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - jobsapp_miniodata:/data

volumes:
  jobsapp_pgdata:
  jobsapp_miniodata:
